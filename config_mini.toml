# Minimal configuration for quick pipeline verification (smoke test).

[project]
device = "cpu"
storage_path = "./checkpoints_test"

[data]
dataset = "cifar10"
batch_size = 128
num_workers = 2

[model]
architecture = "simple_cnn"
prefix = "smoke_test"

[training]
epochs = 1
learning_rate = 0.01
force_retrain = true

[adversarial]
epsilon = 0.031
alpha = 0.007
num_steps = 2
train_prob = 1.0

[patch_attack]
scale = 0.2
learning_rate = 0.1
number_of_steps = 5

[evaluation]
batch_size = 4
attacks_to_run = ["Clean", "FGSM"]
